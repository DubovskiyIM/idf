# ============================================================
# IDF landing — nginx config
# ============================================================
# Замени YOUR_DOMAIN.RU на свой домен (e.g. idf-framework.ru)
# Путь к статике: /var/www/idf-landing
# SSL через Let's Encrypt (certbot)
# ============================================================

# HTTP — редирект на HTTPS + ACME challenge для certbot
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.RU www.YOUR_DOMAIN.RU;

    # Let's Encrypt webroot для обновления сертификата
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное — редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной сервер
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN.RU www.YOUR_DOMAIN.RU;

    # SSL сертификаты (подставит certbot)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.RU/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.RU/privkey.pem;

    # Современные SSL-настройки (Mozilla intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Корень статики
    root /var/www/idf-landing;
    index index.html;

    # Gzip — ускоряет загрузку на 70-80%
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json image/svg+xml;

    # Язык-роутинг: /ru или /ru/ → index-ru.html
    location = /ru  { return 301 /ru/; }
    location = /ru/ { try_files /index-ru.html =404; }

    # /en или /en/ → каноничный / (EN)
    location = /en  { return 301 /; }
    location = /en/ { return 301 /; }

    # Кэширование статики (HTML — короткий кэш, ассеты — длинный)
    location ~* \.(html)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|woff|woff2|ttf|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Основной fallback — index.html (EN)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Скрыть hidden файлы
    location ~ /\.(?!well-known) {
        deny all;
    }
}
