<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDF Studio</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #studio-root { height: 100%; overflow: hidden; background: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
      button { font-family: inherit; cursor: pointer; background: #334155; border: 1px solid #475569; color: #e2e8f0; padding: 4px 10px; border-radius: 3px; }
      button:hover { background: #475569; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="studio-root"></div>
    <script type="module" src="/src/studio/main.jsx"></script>
  </body>
</html>
