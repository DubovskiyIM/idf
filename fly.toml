app = "idf-meshok"
primary_region = "ams"

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "idf_data"
  destination = "/data"

[env]
  NODE_ENV = "production"
  PORT = "3001"
