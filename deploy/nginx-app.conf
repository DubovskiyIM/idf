# nginx server block для https://app.intent-design.tech
# Проксирует HTTP/WS на main контейнер (127.0.0.1:3001).
#
# Размещение:  /etc/nginx/sites-available/app.intent-design.tech
# Активация:   ln -s ../sites-available/app.intent-design.tech /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx
#
# После того как DNS пропагируется — certbot --expand расширит существующий
# сертификат intent-design.tech и добавит app.intent-design.tech:
#   certbot --nginx --expand -d intent-design.tech,www.intent-design.tech,app.intent-design.tech
# certbot сам впишет SSL-блок и редирект 80→443.

server {
    listen 80;
    listen [::]:80;
    server_name app.intent-design.tech;

    client_max_body_size 20m;

    # WebSocket для /ws (IDF использует ws:// для signals)
    location /ws {
        proxy_pass http://127.0.0.1:3001/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }

    # API + статика прототипа (Express отдаёт dist/ через fallback)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
