name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'deploy/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'deploy/**'

# Старый прогон отменяется при новом push в ту же ветку — не копим очередь
# на быстрых сериях коммитов.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # SDK теперь подтягивается из публичного npm (@intent-driven/*),
      # отдельный clone+build idf-sdk monorepo больше не нужен.
      - run: npm ci
      - run: npm test
      - run: npm run build
